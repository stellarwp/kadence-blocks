name: Update POT File

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-generate-pot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          BUN_AUTH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
        run: |
          # `bun install` runs the root postinstall, which builds the @kadence/*
          # source packages (bun blocks their own prepare scripts; npm does not).
          bun install --frozen-lockfile

      - name: Build assets
        run: bun run build

      - name: Install WP-CLI
        run: composer wp

      - name: Generate POT file
        run: composer wp i18n make-pot . languages/kadence-blocks.pot --domain=kadence-blocks --exclude=node_modules,vendor,dist,bin,.git,.github,tests,.pup-build,.pup-zip

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update pot file'
          branch: chore/update-pot
          branch-suffix: timestamp
          title: 'chore: update pot file'
          body: |
            Automated update of the `languages/kadence-blocks.pot` file.
          add-paths: |
            languages/kadence-blocks.pot

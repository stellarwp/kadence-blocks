name: WordPress.org Plugin Check

on:
  workflow_dispatch:

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    env:
      COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.COMPOSER_TOKEN }}"}}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          BUN_AUTH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
        run: |
          composer install --no-dev --no-scripts
          composer run strauss-release
          # `bun install` runs the root postinstall, which builds the @kadence/*
          # source packages (bun blocks their own prepare scripts; npm does not).
          bun install --frozen-lockfile

      - name: Build plugin
        run: bun run build

      - name: Run plugin check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './'
          exclude-directories: 'vendor,src,node_modules'
          categories: |
            performance
            accessibility

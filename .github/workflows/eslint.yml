name: ESLint
run-name: '[ESLint] ${{ github.event.head_commit.message }}'

on:
  push:
  # pull_request:

# permissions:
#   contents: write
#   pull-requests: write

jobs:
  run-linters:
    name: Run linters
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ESLint and Prettier must be in `package.json`
      - name: Remove npm lockfile to prevent bun git-clone issues
        run: rm -f package-lock.json

      - name: Install dependencies
        run: bun install
        env:
          BUN_AUTH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}

      - name: Build Kadence workspace packages (for ESLint import resolution)
        env:
          GIT_CONFIG_GLOBAL: /tmp/ci-gitconfig
        run: |
          printf '[url "https://github.com/"]\n\tinsteadOf = ssh://git@github.com/\n\tinsteadOf = git@github.com:\n' > /tmp/ci-gitconfig
          for pkg in helpers icons components; do
            dir="node_modules/@kadence/${pkg}"
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && npm install && npm run build)
            fi
          done

      - name: Run linters
        uses: wearerequired/lint-action@v2
        with:
          auto_fix: true
          eslint: true
